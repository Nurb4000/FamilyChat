{% extends "base.html" %}  
  
{% block title %}Create Post - Family Chat{% endblock %}  
  
{% block content %}  
<div class="create-post">  
    <h2>Create New Post in {{ room.name }}</h2>  
  
    <form method="POST" action="{{ url_for('create_post', room_id=room.id) }}" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="form-group">  
            <label for="title">Title:</label>  
            <input type="text" id="title" name="title" required>  
        </div>  
  
        <div class="form-group">  
            <label for="content">Content:</label>  
            <textarea id="content" name="content" required></textarea>  
        </div>  
  
        <div class="form-group">  
            <label for="image">Upload Image (Optional):</label>  
            <input type="file" id="image" name="image" accept="image/*">  
        </div>  
  
        <button type="submit" class="btn">Create Post</button>  
        <a href="{{ url_for('room', room_id=room.id) }}" class="btn cancel-btn">Cancel</a>  
    </form>  
</div>  
{% endblock %}
