<!-- templates/send_message_select.html -->
{% extends "base.html" %}
{% block title %}Send Message - Family Chat{% endblock %}
{% block content %}
<div class="admin-panel">
    <h2>Send Message</h2>
    <a href="{{ url_for('messages') }}" class="btn cancel-btn">Back to Messages</a>
    <a href="{{ url_for('index') }}" class="btn cancel-btn">Back to Main</a>
    <div class="create-room" style="margin-top: 2rem;">
        <h3>Select a User to Message</h3>
        <form method="POST" action="{{ url_for('send_message_select_user') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label for="user_id">Choose a user:</label>
                <select id="user_id" name="user_id" required>
                    <option value="">Select a user</option>
                    {% for user in other_users %}
                    <option value="{{ user.id }}">{{ user.username }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn">Continue</button>
        </form>
    </div>
</div>
{% endblock %}
